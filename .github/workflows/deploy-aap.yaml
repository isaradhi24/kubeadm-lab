name: CI Pipeline
on: [push]
jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify cluster access
        run: kubectl cluster-info
           echo "Bypassing label issues! Running on $(hostname)" 
           kubectl get nodes --show-labels  