name: CI-Microservice1 Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/Microservices-app/Microservice1/**'

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd apps/Microservices-app/Microservice1
          ./mvnw -f apps/Microservices-app/Microservice1/pom.xml clean package

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t your-docker-user/ms1:$IMAGE_TAG apps/Microservices-app/Microservice1/
          docker push your-docker-user/ms1:$IMAGE_TAG

      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: .*|image: your-docker-user/ms1:${{ github.sha }}|g" apps/Microservices-app/Microservice1/manifests/deployments.yaml

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add apps/Microservices-app/Microservice1/manifests/deployments.yaml
          git commit -m "chore: update image tag ${{ github.sha }}" || echo "no changes"
          git push