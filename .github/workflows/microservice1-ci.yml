name: microservice1-ci

on:
  push:
    branches: [ main ]
    paths: - 'apps/Microservices-app/Microservice1/src/**' # Only trigger if code changes

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw -f apps/Microservices-app/Microservice1/pom.xml clean package

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME={{ github.sha }} # Use commit SHA for unique image tags 
          IMAGE_TAG=latest
          docker build -t your-docker-user/ms1:$IMAGE_TAG apps/Microservices-app/Microservice1/
          docker push your-docker-user/ms1:$IMAGE_TAG
        - name: Updtae Kubernetees Manifest
          run: |
            # Use sed to replace the image tag in the Kubernetes deployment manifest with the new image tag
            sed -i "s|image: .*|image: your-docker-user/ms1:${{ github.sha }}|g" apps/Microservices-app/Microservice1/manifests/deployments.yaml
          
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add apps/Microservices-app/Microservice1/manifests/deployments.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push 
