security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
jenkins:
  systemMessage: "K8s Lab Jenkins - Managed by JCasC"
  securityRealm:
    local:
      allowsSignup: false
      users:
       - id: "vijay"
         password: "42557"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true
  
  numExecutors: 2
  mode: NORMAL

# Automatically install Maven so the Jenkinsfile 'tools' block works
tool:
  maven:
    installations:
      - name: "Maven-3.9"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.6"

