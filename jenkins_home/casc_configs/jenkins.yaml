# Create the Job automatically
jobs:
  - script: >
      pipelineJob('K8s-Bootstrap-and-Deploy') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/isaradhi24/kubeadm-lab.git')
                  credentials('GitHub_ID')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }