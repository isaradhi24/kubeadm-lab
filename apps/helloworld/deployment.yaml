# Deployment manifest for helloworld
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld-deployment
  namespace: hw-ns
spec:
  replicas: 5
  selector:
    matchLabels:
      app: helloworld
  template:
    metadata:
      labels:
        app: helloworld
    spec:
      containers:
      - name: helloworld
        image: nginxdemos/hello:latest
        ports:
        - containerPort: 80
        
---
apiVersion: v1
kind: Service
metadata:
  name: helloworld-service
  namespace: hw-ns
spec:
  type: NodePort
  selector:
    app: helloworld  # This MUST match the label in your Deployment
  ports:
    - protocol: TCP
      port: 80         # Port inside the cluster
      targetPort: 80   # Port on the container
      nodePort: 30007  # The "Door" on your Worker Node (Choose between 30000-32767)