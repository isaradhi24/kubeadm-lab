---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: https://github.com/isaradhi24/kubeadm-lab.git
    targetRevision: HEAD
    path: apps/helloworld 
  destination:
    server: https://kubernetes.default.svc
    namespace: hw-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
