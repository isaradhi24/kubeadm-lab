apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms1-deployment
  namespace: dev-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms1
  template:
    metadata:
      labels:
        app: ms1
    spec:
      containers:
      - name: ms1-container
        image: isaradhi24/kubeadm-lab-java:72
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ms1-service
  namespace: dev-ns
spec:
  type: NodePort
  selector:
    app: ms1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30009 # Using the next available port