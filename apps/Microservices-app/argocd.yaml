apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservice-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/isaradhi24/kubeadm-lab.git
    targetRevision: main
    # path: apps/Microservices-app/Microservice1/manifests
    path: apps/Microservices-app/Microservice1/argocd.yaml 
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true