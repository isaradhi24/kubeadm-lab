# Recommended Practical Order (Real DevOps Workflow)
#----------------------------------------------------# 
# In real-world scenarios, the order of applying Kubernetes manifests matters for a smooth deployment process. 
# While you can technically apply resources in any order, 
# following a logical sequence helps avoid issues and ensures that dependencies are met.b 
#  
# Here’s the clean, industry-standard sequence:
# - Namespace (optional but recommended)
# - ConfigMaps / Secrets (if needed)
# - Deployments (or StatefulSets, DaemonSets)
# - Services (ClusterIP, NodePort, LoadBalancer)
# - Ingress (if using)
# - NetworkPolicies, RBAC, etc.
# This order ensures:
# - resources have a place to live
# - workloads start correctly
# - networking binds cleanly
# - automation pipelines remain deterministic




