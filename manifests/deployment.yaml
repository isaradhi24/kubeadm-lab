# Deployment manifest for nginx - created by kubeadm-lab
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace : nginx-ns

spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginx-dep-pod
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

# apply the deployment in the nginx namespace (if the namespace is not set in the current context)
# rcommended to include namespace in the manifest to avoid confusion and ensure it is applied to the correct namespace
#   kubectl apply -f deployment.yaml -n nginx       
#
# if namespace is already set in the current context, you can simply run:
# kubectl apply -f deployment.yaml
#  ----> deployment.apps/nginx-deployment created

