apiVersion: argoproject.io/v1
kind: Application
metadata:
  name: Microservices-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/isaradhi24/kubadmin-labs.git'
    targetRevision: HEAD
    path: apps/Microservices-app/Microservice1
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true