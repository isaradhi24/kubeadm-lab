# --- JAVA MICROSERVICE 1 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms1-deployment
  namespace: dev-ns
spec:
  selector:
    matchLabels:
      app: ms1
  template:
    metadata:
      labels:
        app: ms1
    spec:
      containers:
      - name: java-app
        image: your-java-image:latest
        ports:
        - containerPort: 8080 # Based on our logs earlier
---
apiVersion: v1
kind: Service
metadata:
  name: ms1-service
  namespace: dev-ns
spec:
  type: NodePort
  selector:
    app: ms1
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30009
---
# --- NGINX SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: nginx-ns # Ensure this namespace exists!
spec:
  type: NodePort # Changed from LoadBalancer for your local VM
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 # Default Nginx port
      nodePort: 30010 # Must be a different port than 30009