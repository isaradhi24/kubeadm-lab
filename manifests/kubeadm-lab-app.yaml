---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeadm-lab-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/isaradhi24/kubeadm-lab.git
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true